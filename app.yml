name: Runburn
url: https://runburn.app
hook_attributes:
  url: https://your-app-url.com/api/webhook
redirect_url: https://your-app-url.com/auth/callback
public: false
default_permissions:
  actions: read
  administration: read
  members: read
  metadata: read
default_events:
  - workflow_run
  - workflow_job
description: >
  Runburn turns GitHub Actions workflow activity into real dollar intelligence, waste detection,
  and AI-generated optimization recommendations.
setup_url: https://your-app-url.com
setup_on_update: false
request_oauth_on_install: true
oauth_config:
  redirect_urls:
    - https://your-app-url.com/auth/callback
